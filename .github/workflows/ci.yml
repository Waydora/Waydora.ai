name: CI

# Esegue typecheck + test su ogni PR verso main e su push a main.
# Deve restare VERDE per poter fare merge (vedi branch protection nelle
# settings del repo GitHub: richiedere lo status check "ci / build-and-test").

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Annulla run obsolete sullo stesso ref quando arrivano nuovi commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck & Test
    # ubuntu-latest = linux x64: combacia con gli override native-binary in
    # pnpm-workspace.yaml (esbuild/rollup/lightningcss linux-x64).
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # pnpm 9: necessario per la feature `catalog:` usata in pnpm-workspace.yaml.
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile: usa esattamente il lockfile (niente re-resolve),
        # quindi il guard minimumReleaseAge non blocca la CI.
        run: pnpm install --frozen-lockfile

      - name: Typecheck (libs + tutti i package)
        run: pnpm run typecheck

      - name: Test (Vitest, package con script test)
        run: pnpm -r --if-present run test
