kind = "web"
previewPath = "/"
title = "Waydora"
version = "1.0.0"
id = "artifacts/waydora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21859

[services.development]
run = "pnpm --filter @workspace/waydora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/waydora", "run", "build" ]
publicDir = "artifacts/waydora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21859"
BASE_PATH = "/"
